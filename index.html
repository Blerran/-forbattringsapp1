<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Förbättringsappen</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 16px;
      color: #111827;
    }

    .app {
      max-width: 900px;
      margin: auto;
    }

    .hero {
      background: #111827;
      color: white;
      padding: 22px;
      border-radius: 18px;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 6px;
      font-size: 26px;
    }

    .hero p {
      margin: 0;
      color: #d1d5db;
    }

    .box, .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button, label.upload {
      display: inline-block;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      margin-top: 8px;
      margin-right: 6px;
      font-size: 15px;
      cursor: pointer;
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .danger {
      background: #dc2626;
    }

    input[type="file"] {
      display: none;
    }

    .preview {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 12px;
      display: none;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .high {
      background: #fee2e2;
      color: #991b1b;
    }

    .medium {
      background: #fef3c7;
      color: #92400e;
    }

    .low {
      background: #dcfce7;
      color: #166534;
    }

    .card img {
      max-width: 100%;
      border-radius: 12px;
      margin: 10px 0;
    }

    .small {
      color: #6b7280;
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .stat {
      background: white;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.05);
    }

    .stat strong {
      display: block;
      font-size: 24px;
      margin-top: 4px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="hero">
      <h1>Förbättringsappen</h1>
      <p>Fånga problem med text, röst eller bild och skapa ett beslutskort.</p>
    </div>

    <div class="box">
      <h2>Ny förbättring</h2>

      <textarea id="ideaInput" placeholder="Beskriv problemet här..."></textarea>

      <br>

      <button onclick="startVoice()">🎙 Tala in</button>

      <label class="upload">
        📷 Ta bild
        <input type="file" accept="image/*" capture="environment" onchange="handleImage(event)" />
      </label>

      <button onclick="addIdea()">Skapa beslutskort</button>
      <button class="secondary" onclick="clearInput()">Rensa</button>

      <p id="voiceStatus" class="small"></p>
      <img id="imagePreview" class="preview" />
    </div>

    <div class="stats">
      <div class="stat">
        <span class="small">Totalt</span>
        <strong id="totalIdeas">0</strong>
      </div>
      <div class="stat">
        <span class="small">Hög prioritet</span>
        <strong id="highIdeas">0</strong>
      </div>
    </div>

    <div id="ideasList"></div>
  </div>

  <script>
    let ideas = JSON.parse(localStorage.getItem("ideas_voice_image")) || [];
    let selectedImage = "";

    function saveIdeas() {
      localStorage.setItem("ideas_voice_image", JSON.stringify(ideas));
    }

    function startVoice() {
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      if (!SpeechRecognition) {
        alert("Din webbläsare stödjer inte röstinmatning. Testa Chrome eller Safari.");
        return;
      }

      const recognition = new SpeechRecognition();
      recognition.lang = "sv-SE";
      recognition.interimResults = false;

      document.getElementById("voiceStatus").textContent = "Lyssnar... prata nu.";

      recognition.start();

      recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;
        const input = document.getElementById("ideaInput");

        input.value = input.value
          ? input.value + " " + text
          : text;

        document.getElementById("voiceStatus").textContent = "Röst sparad.";
      };

      recognition.onerror = function() {
        document.getElementById("voiceStatus").textContent =
          "Kunde inte lyssna. Testa igen.";
      };

      recognition.onend = function() {
        setTimeout(() => {
          document.getElementById("voiceStatus").textContent = "";
        }, 2000);
      };
    }

    function handleImage(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = function(e) {
        selectedImage = e.target.result;
        const preview = document.getElementById("imagePreview");
        preview.src = selectedImage;
        preview.style.display = "block";
      };

      reader.readAsDataURL(file);
    }

    function analyzeIdea(text, hasImage) {
      const lower = text.toLowerCase();
      let priority = "Medel";

      if (
        lower.includes("fel") ||
        lower.includes("stress") ||
        lower.includes("risk") ||
        lower.includes("farligt") ||
        lower.includes("tid") ||
        lower.includes("väntar") ||
        lower.includes("dubbel")
      ) {
        priority = "Hög";
      }

      if (
        lower.includes("önskemål") ||
        lower.includes("litet") ||
        lower.includes("nice")
      ) {
        priority = "Låg";
      }

      return {
        priority,
        problem: text || "Problem rapporterat med bild.",
        rootCause: guessRootCause(lower, hasImage),
        solution: guessSolution(lower, hasImage),
        effect: guessEffect(lower),
        nextStep: "Testa en enkel åtgärd i liten skala och följ upp efter 1–2 veckor."
      };
    }

    function guessRootCause(text, hasImage) {
      if (text.includes("dubbel") || text.includes("system")) {
        return "Troligt dubbelarbete eller otydligt systemstöd.";
      }
      if (text.includes("väntar") || text.includes("beslut")) {
        return "Otydlig ansvarsfördelning eller för lång beslutsväg.";
      }
      if (text.includes("fel")) {
        return "Saknad kontrollpunkt eller otydlig rutin.";
      }
      if (hasImage) {
        return "Bilden visar sannolikt ett konkret problem som behöver bedömas närmare.";
      }
      return "Trolig orsak är otydlig rutin, ansvar eller uppföljning.";
    }

    function guessSolution(text, hasImage) {
      if (text.includes("system")) {
        return "Kartlägg flödet och samla information på ett ställe.";
      }
      if (text.includes("beslut")) {
        return "Inför tydlig beslutsnivå och svarstid.";
      }
      if (text.includes("fel")) {
        return "Skapa checklista och följ upp återkommande fel.";
      }
      if (hasImage) {
        return "Gå igenom bilden med ansvarig person och besluta om snabb åtgärd.";
      }
      return "Standardisera arbetssättet och gör en liten testförbättring.";
    }

    function guessEffect(text) {
      if (text.includes("tid") || text.includes("väntar") || text.includes("dubbel")) {
        return "Kortare ledtid och mindre onödigt arbete.";
      }
      if (text.includes("stress") || text.includes("arbetsmiljö")) {
        return "Bättre arbetsmiljö och lägre belastning.";
      }
      if (text.includes("fel")) {
        return "Färre fel och mindre omarbete.";
      }
      return "Tydligare arbetssätt och bättre uppföljning.";
    }

    function addIdea() {
      const input = document.getElementById("ideaInput");
      const text = input.value.trim();

      if (!text && !selectedImage) {
        alert("Skriv, tala in eller ta en bild först.");
        return;
      }

      const analysis = analyzeIdea(text, !!selectedImage);

      ideas.unshift({
        id: Date.now(),
        text,
        image: selectedImage,
        createdAt: new Date().toLocaleString("sv-SE"),
        ...analysis
      });

      saveIdeas();
      clearInput();
      renderIdeas();
    }

    function clearInput() {
      document.getElementById("ideaInput").value = "";
      document.getElementById("voiceStatus").textContent = "";
      selectedImage = "";
      const preview = document.getElementById("imagePreview");
      preview.src = "";
      preview.style.display = "none";
    }

    function deleteIdea(id) {
      ideas = ideas.filter(i => i.id !== id);
      saveIdeas();
      renderIdeas();
    }

    function badgeClass(priority) {
      if (priority === "Hög") return "high";
      if (priority === "Låg") return "low";
      return "medium";
    }

    function renderIdeas() {
      const list = document.getElementById("ideasList");

      if (ideas.length === 0) {
        list.innerHTML = "<p class='small'>Inga förbättringar ännu.</p>";
      } else {
        list.innerHTML = ideas.map(i => `
          <div class="card">
            <span class="badge ${badgeClass(i.priority)}">${i.priority} prioritet</span>

            ${i.image ? `<img src="${i.image}" alt="Bild på förbättring" />` : ""}

            <p><b>Problem:</b> ${i.problem}</p>
            <p><b>Trolig orsak:</b> ${i.rootCause}</p>
            <p><b>Föreslagen lösning:</b> ${i.solution}</p>
            <p><b>Förväntad effekt:</b> ${i.effect}</p>
            <p><b>Nästa steg:</b> ${i.nextStep}</p>

            <p class="small">Skapad: ${i.createdAt}</p>

            <button class="danger" onclick="deleteIdea(${i.id})">Ta bort</button>
          </div>
        `).join("");
      }

      document.getElementById("totalIdeas").textContent = ideas.length;
      document.getElementById("highIdeas").textContent =
        ideas.filter(i => i.priority === "Hög").length;
    }

    renderIdeas();
  </script>
</body>
</html>
